<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mirror — Nouveau mot de passe</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F0E8; --cream-dark: #EDE7D9; --cream-border: #DDD5C4;
      --gold: #B8964E; --gold-light: #D4AA6A;
      --text: #2C2416; --text-muted: #8A7A68;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem 1.5rem;
    }
    header { text-align: center; margin-bottom: 2.5rem; }
    .logo { font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 700; color: var(--text); letter-spacing: -1px; }
    .logo .ror { font-style: italic; color: var(--gold); }
    .tagline { font-size: 0.78rem; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-muted); margin-top: 0.5rem; }

    .card {
      background: #FBF8F3; border: 1px solid var(--cream-border);
      border-radius: 24px; padding: 2.2rem 2rem; width: 100%; max-width: 480px;
    }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-style: italic; font-weight: 600; margin-bottom: 0.35rem; }
    .card-sub { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 1.8rem; }

    .field { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.7rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
    input[type="password"] {
      width: 100%; background: var(--cream); border: 1.5px solid var(--cream-border);
      border-radius: 12px; padding: 0.8rem 1rem; font-family: 'Inter', sans-serif;
      font-size: 0.9rem; color: var(--text); outline: none; transition: border-color 0.18s;
    }
    input:focus { border-color: var(--gold-light); }

    .rule { color: #c0392b; font-weight: 500; font-size: 0.75rem; line-height: 1.8; transition: color 0.2s; }
    .rule.ok { color: #276749; }

    .submit-btn {
      width: 100%; margin-top: 1.5rem; padding: 1rem; border-radius: 14px; border: none;
      background: var(--text); color: var(--cream); font-family: 'Playfair Display', serif;
      font-size: 1.05rem; font-style: italic; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .submit-btn:hover { background: #3D3020; }
    .submit-btn:disabled { background: var(--cream-border); color: var(--text-muted); cursor: not-allowed; }

    .msg { display: none; margin-top: 1rem; padding: 0.8rem 1rem; border-radius: 10px; font-size: 0.85rem; text-align: center; }
    .msg.error   { background: #fdf0f0; color: #c0392b; border: 1px solid #f5c6c6; }
    .msg.success { background: #f0fdf4; color: #276749; border: 1px solid #c6f0d8; }
  </style>
</head>
<body>

  <header>
    <div class="logo">Mir<span class="ror">ror</span></div>
    <p class="tagline">Ton styliste personnel</p>
  </header>

  <div class="card">
    <p class="card-title">Nouveau mot de passe</p>
    <p class="card-sub">Choisis un mot de passe solide pour sécuriser ton compte.</p>

    <div class="field">
      <label>Nouveau mot de passe</label>
      <input type="password" id="new-password" placeholder="Minimum 8 caractères" oninput="validatePw()" />
      <div id="pw-rules" style="margin-top:0.5rem; display:none;">
        <div id="rule-length"  class="rule">✗ Au moins 8 caractères</div>
        <div id="rule-upper"   class="rule">✗ Au moins 1 majuscule</div>
        <div id="rule-number"  class="rule">✗ Au moins 1 chiffre</div>
        <div id="rule-special" class="rule">✗ Au moins 1 caractère spécial (!@#$...)</div>
      </div>
    </div>

    <div class="field">
      <label>Confirmer le mot de passe</label>
      <input type="password" id="confirm-password" placeholder="Répète le mot de passe" />
    </div>

    <button class="submit-btn" id="resetBtn" onclick="handleReset()">Enregistrer le nouveau mot de passe</button>
    <div class="msg" id="reset-msg"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://bflxfaksyiktauyxduqb.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_HCG-j-1SO9W3cn8cxRWPcw_yeroRMK0';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Supabase place le token dans le hash de l'URL → il faut l'intercepter
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Token valide, on peut afficher le formulaire (déjà visible)
        console.log('Token de réinitialisation valide.');
      }
    });

    function validatePw() {
      const pw = document.getElementById('new-password').value;
      document.getElementById('pw-rules').style.display = pw.length > 0 ? 'block' : 'none';
      const checks = {
        'rule-length':  pw.length >= 8,
        'rule-upper':   /[A-Z]/.test(pw),
        'rule-number':  /[0-9]/.test(pw),
        'rule-special': /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(pw),
      };
      Object.entries(checks).forEach(([id, ok]) => {
        const el = document.getElementById(id);
        el.classList.toggle('ok', ok);
        el.textContent = (ok ? '✓' : '✗') + ' ' + el.textContent.slice(2);
      });
      return Object.values(checks).every(Boolean);
    }

    async function handleReset() {
      const pw      = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      const msgEl   = document.getElementById('reset-msg');
      const btn     = document.getElementById('resetBtn');

      if (!validatePw()) return showMsg(msgEl, 'error', 'Le mot de passe ne respecte pas toutes les conditions.');
      if (pw !== confirm)  return showMsg(msgEl, 'error', 'Les deux mots de passe ne correspondent pas.');

      btn.disabled = true;
      btn.textContent = 'Enregistrement…';

      const { error } = await sb.auth.updateUser({ password: pw });

      if (error) {
        btn.disabled = false;
        btn.textContent = 'Enregistrer le nouveau mot de passe';
        return showMsg(msgEl, 'error', error.message);
      }

      showMsg(msgEl, 'success', '✅ Mot de passe mis à jour ! Redirection vers la connexion…');
      setTimeout(() => window.location.href = '/signup', 2000);
    }

    function showMsg(el, type, text) {
      el.className = `msg ${type}`;
      el.textContent = text;
      el.style.display = 'block';
    }
  </script>

</body>
</html>
